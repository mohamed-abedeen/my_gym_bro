name: my_gym_bro
description: "Paid fitness tracker with local DB, Supabase sync, and premium UI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  audio_session: ^0.1.21
  audioplayers: ^6.1.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  crypto: ^3.0.3
  cupertino_native_better: ^1.5.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.2.0
  firebase_messaging: ^15.2.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_local_notifications: ^17.2.2
  flutter_localizations:
    sdk: flutter
  # Runtime dep (not dev) despite being codegen-only: as a dev_dependency the
  # release build fails — GeneratedPluginRegistrant references its Android
  # plugin, which the tool excludes for dev deps (flutter/flutter#160407).
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.10
  gal: ^2.3.2
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  home_widget: ^0.7.0
  http: ^1.2.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  oc_liquid_glass: ^0.2.1
  package_info_plus: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.2
  purchases_flutter: ^8.0.0
  riverpod_annotation: ^2.3.5
  share_plus: ^12.0.2
  sqlite3_flutter_libs: ^0.5.0
  supabase_flutter: ^2.8.0
  timezone: ^0.9.4
  url_launcher: ^6.2.5
  uuid: ^4.4.0
  vibration: ^2.0.0
  wakelock_plus: ^1.2.0

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.5
  mocktail: ^1.0.4
  riverpod_generator: ^2.4.0
  very_good_analysis: ^7.0.0

flutter_launcher_icons:
  image_path: assets/icons/app_icon_square.png
  ios: true
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: assets/icons/app_icon_bg.png
  adaptive_icon_foreground: assets/icons/app_icon_fg.png
  windows:
    generate: true
  macos:
    generate: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/exercises_starter.json
    - assets/anatomy/
    - assets/badges/
    - assets/skins/
    - assets/audio/
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # Share-card typography (bundled so cards render offline; google_fonts
  # stays for the rest of the app). Archivo is the variable font — the share
  # cards drive its wght/wdth axes via TextStyle.fontVariations.
  fonts:
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-Variable.ttf
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
