name: my_gym_bro
description: "Paid fitness tracker with local DB, Supabase sync, and premium UI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  audio_session: ^0.1.21
  audioplayers: ^6.1.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  crypto: ^3.0.3
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.2.0
  firebase_messaging: ^15.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.10
  go_router: ^13.2.0
  home_widget: ^0.7.0
  google_fonts: ^6.2.1
  http: ^1.2.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  oc_liquid_glass: ^0.2.1
  package_info_plus: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.2
  purchases_flutter: ^8.0.0
  riverpod_annotation: ^2.3.5
  sqlite3_flutter_libs: ^0.5.0
  supabase_flutter: ^2.8.0
  url_launcher: ^6.2.5
  uuid: ^4.4.0
  vibration: ^2.0.0
  wakelock_plus: ^1.2.0

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.5
  mocktail: ^1.0.4
  riverpod_generator: ^2.4.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/exercises_starter.json
    - assets/anatomy/
    - assets/skins/
    - assets/audio/
    - assets/images/
    - assets/icons/
