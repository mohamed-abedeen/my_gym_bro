name: my_gym_bro
description: "Paid fitness tracker with local DB, Supabase sync, and premium UI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  supabase_flutter: ^2.5.0
  purchases_flutter: ^8.0.0
  dio: ^5.4.3
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  path: ^1.9.0
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  image_picker: ^1.1.2
  oc_liquid_glass: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  intl_utils: ^2.8.5
  mocktail: ^1.0.4
  drift:
    version: ^2.18.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/exercises.json
    - assets/anatomy/
    - assets/audio/
    - assets/images/
