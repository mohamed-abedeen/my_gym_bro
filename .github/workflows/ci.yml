name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      # Block merge on real problems (errors + warnings) but let the
      # pre-existing `info`-level style lints from very_good_analysis through.
      # NOTE: `flutter analyze` is fatal-on-infos by default, so `--fatal-warnings`
      # alone still fails on infos — `--no-fatal-infos` is required to get the
      # intended behaviour. Drop it once the style nits in lib/ are cleaned up.
      - run: flutter analyze --no-fatal-infos --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter test --coverage

  build-android:
    # Debug build: release builds now fail hard without the upload keystore
    # (see android/app/build.gradle.kts). Signed artifacts come from build-aab.
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - name: Build APK
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  # Secrets can't be read in a job-level `if:`, so a tiny job exports whether
  # the keystore secret is set; build-aab is SKIPPED (not failed) when unset.
  check-signing:
    name: Check signing secrets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      have-keystore: ${{ steps.check.outputs.have-keystore }}
    steps:
      - id: check
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "have-keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "have-keystore=false" >> "$GITHUB_OUTPUT"
            echo "ANDROID_KEYSTORE_BASE64 not set — signed AAB build will be skipped."
          fi

  build-aab:
    name: Build Android AAB (signed release)
    runs-on: ubuntu-latest
    needs: [analyze, test, check-signing]
    if: github.ref == 'refs/heads/main' && needs.check-signing.outputs.have-keystore == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - name: Write upload keystore + key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          {
            echo "storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties
      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
